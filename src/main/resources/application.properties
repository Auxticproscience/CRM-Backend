# ─────────────────────────────────────────────
#  CRM Zonas — configuración principal
# ─────────────────────────────────────────────

server.port=8081

spring.application.name=crm-zonas

# ── Base de datos (NeonDB / PostgreSQL) ───────
spring.datasource.url=jdbc:postgresql://ep-broad-night-am3sizh9-pooler.c-5.us-east-1.aws.neon.tech/proscience?sslmode=require&channelBinding=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_2iapqtXGY0BF
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool HikariCP (valores conservadores para NeonDB serverless)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ───────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Upload ────────────────────────────────────
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ── Logging ───────────────────────────────────
logging.level.com.crm.zonas=INFO
logging.level.org.springframework.web=WARN
